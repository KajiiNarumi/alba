<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Alba • Kron</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alba.wisp.place/">
    <meta property="og:title" content="Alba">
    <meta property="og:description" content="Cliente minimalista para Bluesky basado en el protocolo AT.">
    <meta property="og:image" content="https://alba.wisp.place/sunrise.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Alba">
    <meta name="twitter:description" content="Cliente minimalista para Bluesky basado en el protocolo AT.">
    <meta name="twitter:image" content="https://alba.wisp.place/sunrise.png">

    <link rel="icon" type="image/png" href="/sunrise.png">
    <link rel="apple-touch-icon" href="/sunrise.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="brand-alba" onclick="window.location.href='../'">Alba</span> • <span class="brand-kron" onclick="openNavMenu()">Kron</span><span id="navMe" class="brand-me" style="display:none;" onclick="loadMe()"> • Me</span>
        </div>

        <div class="search">
            <input id="userInput" type="text" placeholder="Usuario...">
            <button id="goBtn">Buscar</button>
        </div>
    </header>

    <main class="container">
        <div id="profile"></div>
        <div id="albums" class="albums"></div>
        <div id="postsContainer"></div>
    </main>

    <div id="navMenuModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Módulos Alba</h3>
                <span class="close" onclick="closeNavMenu()">✕</span>
            </div>
            <div class="nav-menu-links">
                <a href="Editor/">Editor</a>
                <a href="../Lux/">Lux</a>
                <a href="../Ink/">Ink</a>
                <a href="../Joto/">Joto</a>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <span class="close" onclick="closeModal()">✕</span>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
