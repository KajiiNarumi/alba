<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alba Editor Ink</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #e0e0e0;
      --dim: #888888;
      --line: #333333;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.7;
    }

    /* ==================== NAVBAR ==================== */
    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    /* ==================== CONTENEDORES ==================== */
    .editor-container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card, .editor-panel, .preview-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
    }

    /* ==================== INPUTS ==================== */
    .input, .title-input, textarea {
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 6px;
      width: 100%;
      margin: 10px 0;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .input:focus, textarea:focus {
      outline: none;
      border-color: #666;
    }

    .title-input {
      font-size: 1.5rem;
      font-weight: 600;
      padding: 16px;
    }

    textarea#content {
      min-height: 420px;
      resize: vertical;
      font-family: 'Courier New', Courier, monospace;
    }

    textarea#synopsis {
      min-height: 80px;
      resize: none;
    }

    .char-counter {
      text-align: right;
      font-size: 0.85rem;
      color: var(--dim);
      margin-top: -5px;
      margin-bottom: 15px;
    }

    /* ==================== GRID ==================== */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .markdown-preview {
      background: var(--surface);
      padding: 25px;
      border-radius: 6px;
      min-height: 420px;
      overflow-y: auto;
      border: 1px solid var(--line);
    }

    /* ==================== IMÁGENES EN VISTA PREVIA ==================== */
    .markdown-preview img {
      display: block;
      max-width: 80%;
      height: auto;
      margin: 24px auto;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    /* ==================== BOTONES ==================== */
    button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #1a1a1a;
      border-color: #555;
      color: #fff;
    }

    .btn-primary {
      background: #e0e0e0;
      color: #000;
      border: none;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #ffffff;
    }

    .actions {
      margin: 20px 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ==================== LISTA Y ESTADOS ==================== */
    .record {
      background: var(--surface);
      padding: 20px;
      margin: 15px 0;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .record-tags {
      color: var(--dim);
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .logged {
      color: #aaaaaa;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .editor-grid { grid-template-columns: 1fr; }
    }


  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Alba Ink.</div>
    <div id="userStatus" class="logged">No conectado</div>
  </nav>

  <div class="editor-container">

    <!-- Login -->
    <div id="loginSection" class="card">
      <h2>Acceso PDS</h2>
      <input class="input" id="identifier" placeholder="Handle (ej. iasuarezv.com)">
      <input class="input" id="password" type="password" placeholder="App Password">
      <button class="btn-primary" onclick="login()">Iniciar Sesión</button>
    </div>

    <!-- Panel Principal -->
    <div id="mainSection" style="display:none;">
      <div class="actions">
        <button onclick="logout()">Cerrar Sesión</button>
        <button onclick="clearForm()">Nuevo Escrito</button>
        <button onclick="listTexts()">Refrescar Lista</button>
      </div>

      <div class="editor-grid">
        <!-- Editor -->
        <div class="editor-panel">
          <!-- Límite de 60 caracteres añadido -->
          <input class="title-input" id="title" placeholder="Título del escrito" maxlength="60">

          <input class="input" id="category" placeholder="Categorías (ej. #tecnologia #filosofia)">

          <!-- Límite de 120 caracteres ajustado -->
          <textarea id="synopsis" class="input" placeholder="Sinopsis breve..." maxlength="120"></textarea>
          <div id="synopsisCounter" class="char-counter">0 / 120</div>

          <textarea id="content" placeholder="Escribe tu contenido en Markdown..."></textarea>

          <div class="actions">
            <button class="btn-primary" onclick="saveText()">Guardar Escrito</button>
          </div>
        </div>

        <!-- Preview -->
        <div class="preview-panel">
          <h3>Vista Previa</h3>
          <div id="preview" class="markdown-preview"></div>
        </div>
      </div>

      <!-- Lista -->
      <div class="card">
        <h3>Archivo</h3>
        <div id="recordsList"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
